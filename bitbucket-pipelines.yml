image:node:18

pipelines:
  branches:
    main: # ここをご自身の公開ブランチ名（例: master, main など）に合わせてください
      - step:
          name: Deploy to Azure Static Web Apps
          deployment: production
          services:
            - docker
          script:
            - pipe: microsoft/azure-static-web-apps-deploy:latest
              variables:
                API_TOKEN: $AZURE_STATIC_WEB_APPS_API_TOKEN
                APP_LOCATION: '/'
                API_LOCATION: '/api'
                OUTPUT_LOCATION: '/'
